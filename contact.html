<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop a Message</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            border: 1px solid #222;
            padding: 30px;
            background-color: #111;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 100%;
            box-sizing: border-box;
        }
        h1 { 
            color: #00adb5; 
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            height: 150px;
            background-color: #1a1a1a;
            color: #ffffff;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 12px;
            font-family: Arial, sans-serif;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        textarea:focus {
            outline: none;
            border-color: #00adb5;
        }
        button {
            width: 100%;
            background-color: #ff007f;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #e0006c;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #666;
            text-decoration: none;
            font-size: 13px;
        }
        .back-link:hover {
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Contact BushDev</h1>
        <div class="subtitle">Leave a message, idea, or feedback.</div>
        
        <form action="https://formsubmit.co/BushSlaps@outlook.com" method="POST">
            
            <input type="hidden" name="_next" value="https://bushdevelops.github.io/contact.html">
            <input type="hidden" name="_captcha" value="false">

            <textarea name="message" placeholder="Type your message here..." required></textarea>
            
            <button type="submit">Submit Message</button>
        </form>

        <a class="back-link" href="/"><- Return Hub</a>
    </div>

</body>
</html>
