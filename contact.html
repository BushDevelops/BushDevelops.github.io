<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop a Message</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            border: 1px solid #222;
            padding: 30px;
            background-color: #111;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 100%;
            box-sizing: border-box;
        }
        h1 { 
            color: #00adb5; 
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            height: 150px;
            background-color: #1a1a1a;
            color: #ffffff;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 12px;
            font-family: Arial, sans-serif;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 5px;
        }
        textarea:focus {
            outline: none;
            border-color: #00adb5;
        }
        button {
            width: 100%;
            background-color: #ff007f;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #e0006c;
        }
        button:disabled {
            background-color: #444;
            color: #888;
            cursor: not-allowed;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 13px;
        }
        .back-link:hover {
            color: #999;
        }
        /* Formspree Status Message Styling */
        [data-fs-success] {
            color: #00adb5;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
        }
        [data-fs-error] {
            color: #cc0000;
            font-size: 13px;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Contact BushDev</h1>
        <div class="subtitle">Leave a message, idea, or feedback. Drop your email if you need a reply!</div>
        
        <div data-fs-success></div>
        <div data-fs-error></div>

        <form id="contact-form">
            <textarea id="message" name="message" placeholder="Type your message here..." data-fs-field required></textarea>
            <span data-fs-error="message"></span>
            
            <button type="submit" data-fs-submit-btn>Submit Message</button>
        </form>

        <a class="back-link" href="/"><- Return Hub</a>
    </div>

    <script>
        window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
        formspree('initForm', { formElement: '#contact-form', formId: 'mdajlkql' });
    </script>
    <script src="https://unpkg.com/@formspree/ajax@1" defer></script>

</body>
</html>
