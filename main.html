<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            border: 1px solid #222;
            padding: 40px;
            background-color: #111;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }
        h1 { 
            color: #00adb5; 
            margin-bottom: 5px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .btn {
            display: block;
            background-color: #ff007f;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin: 10px 0;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #e0006c;
        }
        .btn-alt {
            background-color: #222;
            border: 1px solid #444;
        }
        .btn-alt:hover {
            background-color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>bushdev's weird antics</h1>
        <div class="subtitle">Select a destination node</div>
        
        <a class="btn" href="https://guns.lol/bushdev" target="_blank">view profile page -></a>
        <a class="btn btn-alt" href="/lolcat">go to lolcat translator -></a>
        <a class="btn btn-alt" href="/contact.html">Contact -></a>
    </div>
</body>
</html>
